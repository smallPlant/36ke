name: Build Windows Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt -r packaging/requirements-build.txt
          playwright install chromium

      - name: PyInstaller build
        run: pyinstaller packaging/36ke-full.spec --noconfirm --distpath dist --workpath build

      - name: Bundle Chromium and launchers
        shell: pwsh
        run: |
          $dist = "dist/36Ke"
          $src = "$env:LOCALAPPDATA/ms-playwright"
          New-Item -ItemType Directory -Force -Path "$dist/browsers" | Out-Null
          Get-ChildItem $src -Directory -Filter "chromium*" | ForEach-Object {
            Copy-Item $_.FullName "$dist/browsers/$($_.Name)" -Recurse -Force
          }
          if (-not (Get-ChildItem "$dist/browsers" -ErrorAction SilentlyContinue)) {
            throw "Chromium not found under $src"
          }
          Copy-Item packaging/launcher/* $dist -Force

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist/36Ke -DestinationPath dist/36Ke-完整版-win64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 36Ke-win64
          path: dist/36Ke-完整版-win64.zip
          retention-days: 30
